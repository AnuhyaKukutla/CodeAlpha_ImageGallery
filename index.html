<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<div class="gallery">
    <img src="images/image1.jpeg" onclick="openLightbox(0)">
    <img src="images/image2.jpeg" onclick="openLightbox(1)">
    <img src="images/image3.jpeg" onclick="openLightbox(2)">
    <img src="images/image4.jpeg" onclick="openLightbox(3)">
    <img src="images/image5.jpeg" onclick="openLightbox(4)">
</div>

<div id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>

    <button class="prev" onclick="changeImage(-1)">❮</button>

    <img id="lightbox-img">

    <button class="next" onclick="changeImage(1)">❯</button>
</div>

<script src="script.js"></script>

</body>
</html>
